<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TPS Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card-gradient: linear-gradient(145deg, #1e293b 0%, #020617 100%);
            --accent: #00f2ff;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Saldo */
        .header { padding: 60px 20px 40px; text-align: center; }
        .label { color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }
        .balance { font-size: 48px; font-weight: 700; margin: 10px 0; letter-spacing: -1px; }

        .container { flex: 1; padding: 0 20px; }

        /* LA CARTA TPS BANK */
        .card {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1.58 / 1;
            background: var(--card-gradient);
            border-radius: 24px;
            padding: 25px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        /* Logo TPS Stilizzato */
        .logo-container { display: flex; align-items: center; gap: 10px; z-index: 2; }
        
        .tps-logo {
            width: 32px; height: 32px;
            background: var(--accent);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: black; font-size: 14px;
        }

        .bank-name { font-weight: 600; font-size: 18px; letter-spacing: 1px; }

        /* Riflesso sulla carta */
        .card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .card-number { font-size: 20px; letter-spacing: 3px; font-family: monospace; color: #ffffff; z-index: 2; }
        .card-holder { font-size: 14px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }

        /* Bottoni Rapidi */
        .actions { display: flex; justify-content: center; gap: 50px; margin-top: 50px; }
        .btn { text-align: center; background: none; border: none; cursor: pointer; color: white; }
        .btn-icon {
            width: 60px; height: 60px; border-radius: 20px;
            background: #0f172a; border: 1px solid #1e293b;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--accent); margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn:active .btn-icon { transform: scale(0.9); background: #1e293b; }

        /* Navigazione Inferiore */
        nav {
            margin-top: auto; background: #020617;
            display: flex; justify-content: space-around;
            padding: 15px 0 40px; border-top: 1px solid #0f172a;
        }
        nav i { font-size: 22px; color: #334155; transition: 0.3s; }
        nav i.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <p class="label">Total Balance</p>
        <h1 class="balance" id="saldo">€ 1000,00</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="logo-container">
                <div class="tps-logo">TPS</div>
                <span class="bank-name">BANK</span>
            </div>

            <div class="card-number">**** **** **** 1001</div>

            <div style="display: flex; justify-content: space-between; align-items: flex-end; z-index: 2;">
                <div>
                    <p style="font-size: 9px; color: var(--text-muted); margin-bottom: 4px;">CARD HOLDER</p>
                    <p class="card-holder">DANILO SORU</p>
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" style="height: 25px; opacity: 0.8;">
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="update(10)">
                <div class="btn-icon"><i class="fa-solid fa-plus"></i></div>
                <p class="label">Boost</p>
            </button>
            <button class="btn" onclick="update(-10)">
                <div class="btn-icon"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
                <p class="label">Send</p>
            </button>
        </div>
    </div>

    <nav>
        <i class="fa-solid fa-house-chimney active"></i>
        <i class="fa-solid fa-chart-line"></i>
        <i class="fa-solid fa-credit-card"></i>
        <i class="fa-solid fa-user"></i>
    </nav>

    <script>
        let balance = 0;
        function update(amount) {
            balance += amount;
            if (balance < 0) balance = 0;
            document.getElementById('saldo').innerText = "€ " + balance.toFixed(2).replace('.', ',');
        }
    </script>
</body>
</html>
