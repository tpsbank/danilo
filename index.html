<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --accent-cyan: #00f2ff;
            --text-secondary: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header { padding: 60px 20px 30px; text-align: center; }
        .label { color: var(--text-secondary); font-size: 14px; letter-spacing: 1px; }
        .balance { font-size: 44px; font-weight: 700; margin: 8px 0; }

        /* Main */
        .container { flex: 1; padding: 0 25px; display: flex; flex-direction: column; align-items: center; }

        /* LA CARTA MODERNA E SEMPLICE */
        .card {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1.58 / 1;
            background: var(--card-gradient);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Logo Moderno (Semplice e Geometrico) */
        .logo-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-cyan);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%); /* Un triangolo pulito */
            opacity: 0.9;
        }

        .card-number {
            font-size: 20px;
            letter-spacing: 2px;
            color: white;
            opacity: 0.9;
            font-family: 'Courier New', monospace;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .holder { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
        .expiry { font-size: 12px; color: white; }

        /* Bottoni */
        .actions {
            display: flex;
            gap: 50px;
            margin-top: 50px;
        }
        .btn-group { text-align: center; cursor: pointer; }

            height: 60
