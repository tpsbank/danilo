<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Bank App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --card-gradient: linear-gradient(135deg, #1a1c2c 0%, #0a0b10 100%);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .total-balance-label { color: var(--text-dim); font-size: 14px; letter-spacing: 1px; }
        .balance-amount { font-size: 48px; font-weight: 700; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .show-balance { color: var(--text-dim); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Contenitore Carta */
        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .credit-card {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1.58 / 1;
            background: var(--card-gradient);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Effetto luce sulla carta */
        .credit-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            transform: rotate(30deg);
        }

        .chip {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #e2b04a, #9d7522);
            border-radius: 6px;
            position: relative;
        }

        .card-number {
            font-size: 22px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            z-index: 2;
        }

        .card-holder {
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
        }

        /* Bottoni Rapidi */
        .quick-actions {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .btn-circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: transparent;
            transition: transform 0.2s;
        }

        .btn-circle:active { transform: scale(0.9); }

        .boost { border: 2px solid #3b82f6; color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
