<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bank</title>
    <style>
        /* Se vedi lo sfondo ROSSO allora il codice sta caricando */
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center;
        }
        .app { padding: 40px 20px; }
        .balance { font-size: 40px; margin: 20px 0; color: #00f2ff; }
        
        /* CARTA MODERNA SEMPLICE */
        .card {
            background: linear-gradient(135deg, #111, #222);
            border: 2px solid #00f2ff; /* Bordo colorato per vederla bene */
            border-radius: 15px;
            height: 200px;
            width: 100%;
            max-width: 350px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .logo { font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; }
        .btn {
            background: #00f2ff;
            color: black;
            padding: 15px 30px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 30px;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <p>IL TUO SALDO</p>
        <div class="balance">€ 1.250,00</div>
        
        <div class="card">
            <div class="logo">MODERN BANK</div>
            <div>•••• •••• •••• 1055</div>
            <div style="margin-top: 20px; font-size: 12px; color: #888;">LEONARDO SORU</div>
        </div>

        <a href="#" class="btn">AGGIUNGI FONDI</a>
    </div>
</body>
</html>
